# Package ######################################################################

[project]
name = "liuren_modeling"
description = "Light-weight full-system simulation framework"
readme = "README.md"
version = "0.1.0"
requires-python = ">=3.9"

# Test tools ###################################################################

[tool.pytest.ini_options]
pythonpath = ["."]
markers = [
    "npu: mark test as requiring NPU hardware (torch_npu + physical device)",
]
addopts = "-m 'not npu'"

# Coverage #####################################################################

[tool.coverage.run]
branch = true
omit = [
    "*/test_*.py",
    "*/tests/*",
    "*/__pycache__/*",
    "*/.pytest_cache/*",
    "*/builtin_model/*"
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "@abstractmethod",
    "raise NotImplementedError",
]

[dependency-groups]
lint = [
    "pre-commit>=4.3.0",
]
