    notes: "[LOW] op-plugin: aclnnLtScalar. 0313: 14x. DSv3 0319: LessAiCore 950x."

  "profiling.LogicalAnd":
    kernel_type: LogicalAnd
    alternate_kernel_types: [LogicalAndAiCore]
    notes: "[LOW] op-plugin: aclnnLogicalAnd. 0313: 14x. DSv3 0319: LogicalAndAiCore 950x."

  "profiling.LogicalNot":
    kernel_type: LogicalNot
    alternate_kernel_types: [LogicalNotAiCore]
    notes: "[LOW] op-plugin: aclnnLogicalNot. 0313: 14x. DSv3 0319: LogicalNotAiCore 950x."

  "profiling.reshape_and_cache_200000000":
    kernel_type: reshape_and_cache_200000000
    notes: >
      [LOW] vllm-ascend Triton KV cache kernel variant.
      Number suffix is Triton JIT hash/config ID. 0313 profiling: 8576x.

  # ===== DSv3 0319 New kernel =====

  "profiling.PadV3":
    kernel_type: PadV3
    alternate_kernel_types: [PadV3AiCore]
    notes: >
      [MEDIUM] DSv3 0319 decode added. Padding kernel, 35K+ calls.
      Appears in CANN 8.5 graph compilation mode, does not exist in old 0316 data.

  "profiling.MemSet":
    kernel_type: MemSet
    zero_cost: true
    notes: >
      [LOW] DSv3 0319 New. Memory initialization kernel, 35K+ times.
      zero_cost: non-computing kernel, latency is determined by the hardware memory controller, TC is not modeled.

  "profiling.allreduceAicpuKernel":
    kernel_type: allreduceAicpuKernel
    category: communication
    notes: >
      [MEDIUM] DSv3 0319 Added. AICPU side allReduce dispatch kernel.
      Paired with hcom_allReduce_. Latency is included in the Stage time of hcom_allReduce_.
      v0.18.0: Still present in DSv3 PF but in reduced numbers.

  "profiling.BatchMatMulNd":
    kernel_type: BatchMatMulNd
    notes: >
      [LOW] DSv3 0319 decode added. BMM ND format variant. 282 times.

  # ===== AiCore accelerated variant (DSv3 0319) =====

  "profiling.AddAiCore":
    kernel_type: AddAiCore
    notes: "[LOW] DSv3 0319. AiCore Acceleration Add. 846x."

  "profiling.AscendQuantV2Aicore":
    kernel_type: AscendQuantV2Aicore
    notes: "[LOW] DSv3 0319. AiCore accelerated AscendQuantV2. 846x."

  "profiling.AddRmsNormDynamicQuantAiCore":
    kernel_type: AddRmsNormDynamicQuantAiCore
    notes: "[LOW] DSv3 0319. AiCore acceleration AddRmsNormDynamicQuant. 282x."

  "profiling.AsStridedAiCore":
    kernel_type: AsStridedAiCore
    notes: "[LOW] DSv3 0319. AiCore Accelerated AsStrided. 282x."

  "profiling.TransposeAiCore":
    kernel_type: TransposeAiCore
    notes: "[LOW] DSv3 0319. AiCore accelerated Transpose. 282x."

  # ===== vLLM 0.18.0 new kernel =====

  "profiling.muls_add_kernel":
    kernel_type: muls_add_kernel
    notes: >
      [MEDIUM] vllm-ascend v0.18.0 Triton fused kernel (vllm_ascend/ops/triton/muls_add.py).
      MulsAddFusionPass replaces Muls+Add pattern with single Triton call: x*scale+y.
      MoE routing scale operation (routed_scaling_factor). DSv3 only.
      0325 profiling: muls_add_kernel(174x), muls_add_kernel_1(1682x) — different BLOCK_SIZE configs.
      Normalized to muls_add_kernel by parse_kernel_details.py.

  # ===== 0325/0326 profiling new coverage =====

  "profiling.AttentionUpdate":
    kernel_type: AttentionUpdate
    notes: >
      [HIGH] aclnnAttentionUpdate — log-sum-exp attention output merger for MLA chunked-context prefill.
      torch_npu.npu_attention_update() merges partial attention outputs from SP chunks.
      DSv3 PF 183x (61 layers × 3 fwd), avg 714us. Independent aclnn kernel, NOT FIA internal.
      Input pattern: (N; N; N,128; N,128) where N=num_tokens*num_heads, 128=v_head_dim.
      Future: may be added to MLA composite sub_kernels (prefill branch) when
      chunked-context loop modeling is implemented.

  "profiling.PagedCacheLoadNdKernel":
    kernel_type: PagedCacheLoadNdKernel
    notes: >
      [MEDIUM] ATB paged KV cache load for MLA chunked-context prefill.
      torch_npu.atb.npu_paged_cache_load / npu_gather_pa_kv_cache.
      DSv3 PF 183x, avg 16-20us. Low priority for MLA composite.
      Shape depends on block table layout (block_count, block_size, head_dim).

  "profiling.Pack":
    kernel_type: Pack
    zero_cost: true
    notes: >
      [LOW] CANN internal tensor packing kernel. DSv3 0326 profiling.
      Appears in aclgraph compiled execution. TC does not model.

  "profiling.ConcatD":
    kernel_type: ConcatD
    zero_cost: true
    notes: >
      [LOW] CANN concat kernel (aclnnCat → ConcatD). Appears in 0326 profiling for
      non-contiguous tensor concatenation. Low latency, TC does not model separately.

  "profiling.RealDiv":
    kernel_type: RealDiv
    zero_cost: true
    notes: >
      [LOW] op-plugin: DivKernelNpuOpApi.cpp → aclnnDiv → RealDiv.
      TC aten.div.Tensor marked zero_cost (MoE softmax normalization, <0.002ms).
      Profiling: Qwen3 RealDiv(6-382x), DSv3 RealDiv(4-130x). Kept as placeholder
      for completeness; latency captured by MoeGatingTopK in TC model.


