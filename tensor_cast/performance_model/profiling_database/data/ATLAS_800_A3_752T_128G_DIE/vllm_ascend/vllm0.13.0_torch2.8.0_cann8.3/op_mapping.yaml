# op_mapping.yaml — operator mapping table (Production-ready)
# Path: tensor_cast/performance_model/perf_database/data/{device}/vllm_ascend/{version}/op_mapping.yaml
#
# Mapping methodology (follow tutorial/OP_PLUGIN_MAPPING_TUTORIAL.md):
# Each mapping follows a complete evidence chain, and the evidence is written into the notes field:
# Path A: TC op → torch_npu/aten API → op-plugin YAML → C++ impl → EXEC_NPU_CMD(aclnn*) → Profiling Type
# Path B: vLLM-ascend Python → torch_npu.npu_* → op-plugin → aclnn* → Profiling Type
# Path C: vLLM-ascend fusion pass → custom kernel → Profiling Type
#
# Data source:
# - TensorCast registration operator: register_tensor_cast_op (56 ops, tensor_cast/ops/*.py)
#   - op-plugin: /home/horacehxw/Projects/op-plugin/ (op_plugin_functions.yaml + opapi/*.cpp)
#   - vLLM-ascend: vllm_ascend/ops/*.py (torch_npu pybind + Triton kernels)
# - DSV3 PandD Profiling (CANN 8.3): 32 cards W8A8, 22773 kernels, 68 unique Types
# - Qwen3-32B PandD Profiling (CANN 8.3): 16 cards BF16, 14832 kernels, 51 unique Types
#
# Field description:
# kernel_type: Profiling Type column value (used for database query key)
# category: operator category (drives query dispatch, such as communication)
# query_mode: special query mode (such as attention_special)
# composite: true means 1:N mapping, which needs to be decomposed and queried kernel by kernel.
# sub_kernels: Composite mapping sub-kernel list
# notes: chain of evidence + additional explanation
#
# ============================================================================
#Field Reference (Field Reference)
# ============================================================================
#
# --- Top-level Fields ---
#
# version (string): vLLM-ascend version number, identifying the profiling data source.
# device (string): Hardware device model (such as ATLAS_800_A3_752T_128G_DIE).
# cann_version (string): CANN version number, affects kernel type and fusion behavior.
# pytorch_version (string): PyTorch version number.
# op_plugin_version (string): op-plugin version number.
# collection_date (string): profiling data collection date (YYYY-MM-DD).
# communication_data_ref (string): Relative path to communication CSV data.
# communication_fallback (string): Fallback strategy when communication query misses (analytic).
# interpolation_policy: Interpolation policy configuration.
# default_method (string): Default interpolation method (linear). All operators default to dtype+format
# Exact matching, linear interpolation of shape dimension.
# kernel_overrides (map): Interpolation override configuration for a specific kernel.
# Example: FusedInferAttentionScore: { shape_transform: sqrt }
# shape_transform: sqrt operator for O(seq²) complexity, interpolating in sqrt(seq) space.
#
# --- Available fields for each mapping in operator_mappings ---
#
# kernel_type (string, required*):
# The value of the Type column in NPU Profiling kernel_details.csv is also the CSV file name.
# Constraint: Must exactly match the file name of {kernel_type}.csv in the data/ directory.
# Example: kernel_type: MatMulV2 → Query MatMulV2.csv
# * Can be omitted when zero_cost: true or composite: true.
#
# alternate_kernel_types (list[string], optional):
# List of alternative kernel types, sorted by priority. When the CSV query of kernel_type misses,
# Try the kernel types in the alternate list in sequence.
# Constraint: Each value must have a corresponding {name}.csv file.
# Example: alternate_kernel_types: [MatMulV3, MatMulCommon]
#
# category (string, optional):
# Operator category, drives query dispatch logic. Default is "compute".
# Optional values: compute | communication
# - compute: standard calculation operator, matches CSV by shape (default)
# - communication: communication operator, query hccl CSV by message_bytes + topology_tier
# Example: category: communication → Take the communication query path
#
# query_mode (string, optional):
# Special query mode, overriding the default shape matching logic.
# Optional values: attention_special | elementwise
# - attention_special: query by (batch, seq, heads, head_dim) quadruple
# - elementwise: match by output shape, scale using byte-ratio dtype
# Example: query_mode: attention_special
#
# composite (bool, optional):
# true indicates 1:N composite mapping, and one op of TC corresponds to multiple kernels on the NPU.
# Need to be used with sub_kernels.
# Constraint: kernel_type is not required when composite: true.
#
# sub_kernels (list[string], required for composite):
# List of sub-kernels for composite mapping. When querying, query the sub-kernels one by one and sum them up.
# Constraint: Each sub-kernel must have a corresponding CSV or be a known communication kernel.
# Example: sub_kernels: [MatMulV2, hcom_allReduce_]
#
# tc_input_count (int, optional):
# The number of valid tensor inputs on the TC side, used to intercept the first N inputs during shape matching.
# Background: The input number/order of TC op and NPU kernel may be different (for example, NPU has additional axis parameters).
# Example: tc_input_count: 2 → only match the shape of the first 2 tensor inputs
#
# zero_cost (bool, optional):
# true means that the op has no actual kernel execution on the NPU (shape-only view, fusion absorption, etc.).
# The query returns 0 directly, without accessing CSV.
# Constraint: kernel_type is not required when zero_cost: true.
#
# accepted_miss (string, optional):
# Mark this op's CSV query as MISS as expected behavior (not an error), and explain why.
# Used when TC exists but the corresponding kernel does not exist in NPU profiling.
#
# notes (string, recommended):
# Evidence chain + supplementary explanation. Format: [Priority] Traceability path + profiling verification.
# Priority: [HIGH] high frequency/critical path, [MEDIUM] medium frequency, [LOW] low frequency/placeholder.
#
# ============================================================================
# Add new mapping example
# ============================================================================
#
# Example 1: Standard calculation operator (1:1 mapping)
#   "aten.mm.default":
# kernel_type: MatMulV2 # CSV file: MatMulV2.csv
#     notes: "[HIGH] op-plugin: aclnnMm. Profiling: MatMulV2(275x)."
#
# Example 2: Communication operator
#   "tensor_cast.all_reduce.default":
#     kernel_type: hcom_allReduce_
# category: communication # Take the communication query path
#     notes: "[HIGH] HCCL direct."
#
# Example 3: Composite operators (static sub_kernels)
#   "tensor_cast.matmul_all_reduce.default":
# composite: true # 1:N mapping
# sub_kernels: [MatMulV2, hcom_allReduce_] # Query and sum one by one
#     notes: "[MEDIUM] MC2 fusion."
#
# Example 4: Zero-cost op
#   "aten.view.default":
# zero_cost: true # Return 0 directly
#     notes: "Shape-only view, no kernel execution on NPU"
#
# Example 5: Special query mode
#   "tensor_cast.attention.default":
#     kernel_type: FusedInferAttentionScore
# query_mode: attention_special # Query by (batch,seq,heads,head_dim)
#     notes: "[HIGH] aclnnFusedInferAttentionScoreV2/V3."
#
# ============================================================================
# Frequently Asked Questions (FAQ)
# ============================================================================
#
# Q1: Where does the value of kernel_type come from?
# A1: Obtained from the Type column of kernel_details.csv of NPU profiling.
# After parsing using tools/perf_data_collection/parse_kernel_details.py,
# Each unique Type will generate a {Type}.csv file.
#
# Q2: What should I do if the input numbers of TC op and NPU kernel are different?
# A2: Use tc_input_count to specify the number of valid inputs on the TC side.
# For example, TC embedding has (weight, indices), NPU CSV has (weight, indices, axis),
# Set tc_input_count: 2 to only match the first 2.
#
# Q3: What should I do if one TC op corresponds to multiple NPU kernels?
# A3: Use composite: true + sub_kernels list.
# When querying, query the sub-kernels one by one and sum the delay.
#
# Q4: How to deal with the kernel that appears in NPU profiling but has no corresponding op in TC?
# A4: Add the "profiling.{KernelType}" entry in the "Profiling-only Placeholder" area.
# These entries are used for CSV data integrity, TC will not actively query them.
#
# Q5: What should I do if the same aclnn API produces different kernel types in different CANN versions?
# A5: Use alternate_kernel_types to list all possible kernel types, sorted by priority.
#

version: "0.15.0"  # CANN 8.3 updated
device: ATLAS_800_A3_752T_128G_DIE
cann_version: "8.3.RC1"
op_plugin_version: "7.2.0"
collection_date: "2026-03-10"

communication_data_ref: "../../hccl/v8.3.RC1/"
communication_fallback: analytic

interpolation_policy:
  default_method: linear # Default for all operators: dtype+format exact matching, shape dimension linear interpolation
  kernel_overrides: # Only list kernel_types that require special handling
    FusedInferAttentionScore:
      shape_transform: sqrt # O(seq²) → interpolation in sqrt(seq) space


# ============================================================================
# Calculate operator mapping (operator_mappings)
# ============================================================================

operator_mappings:

  # ========== 1. Standard aten operator ==========

  "aten.mm.default":
    kernel_type: MatMulV2
    notes: >
      [HIGH] op-plugin: YAML:3486 / MmKernelNpuOpApi.cpp.
      aclnn: aclnnMm (ND), aclnnMatmulWeightNz (NZ weight); both Type are MatMulV2.
      Profiling: Qwen3 Prefill MatMulV2(275x), DSV3 Decode MatMulV2(41x, dynamic path).

  "aten.addmm.default":
    kernel_type: MatMulV2
    notes: >
      [MEDIUM] op-plugin: YAML:915 / AddmmKernelNpuOpApi.cpp.
      aclnn: aclnnAddmm (ND), aclnnAddmmWeightNz (NZ); The underlying kernel Type is still MatMulV2.
      In vLLM reasoning, nn.Linear usually takes mm (no bias), and addmm appears less frequently; aclnnAddmm entry is not seen in profiling.
      [Manual Review] A colleague believes that "addmm has weighted addition and cannot be summarized by MatMulV2"; after verification, AddmmKernelNpuOpApi.cpp calls
      aclnnAddmm/aclnnAddmmWeightNz, the NPU bottom layer still executes MatMulV2 kernel (bias add is integrated). The mapping is correct.

  "aten.bmm.default":
    kernel_type: BatchMatMulV2
    alternate_kernel_types: [batch_matmul_transpose]
    notes: >
      [HIGH] Path A. CANN 8.3: TransposeBatchMatMul replaced by BatchMatMulV2 (366x DSv3)
      and batch_matmul_transpose (366x). op-plugin: BmmKernelNpuOpApi.cpp → aclnnBatchMatMul → BatchMatMulV2.
      batch_matmul_transpose is the transposed variant (MLA attn_output @ W_UV).

  "aten.embedding.default":
    kernel_type: GatherV2
    alternate_kernel_types: [GatherV3]
    notes: >
      [HIGH] op-plugin: YAML:1930 / EmbeddingKernelNpuOpApi.cpp.
      aclnn: aclnnEmbedding; internally implemented as gather dim=0 (computation operator, non-communication).
      Profiling: DSV3 GatherV2(123x), Qwen3 GatherV2(4x) + GatherV3(8x).
      [Manual Review] Colleagues marked "embedding type, completely unrelated to communication type"; confirmed that GatherV2 is a computing type kernel (non-communication),
      The current mapping is not classified as communication, the mapping is correct. GatherV3 also appears in Qwen3, and alternate has been added.

  "aten.index_select.default":
    kernel_type: GatherV3
    alternate_kernel_types: [GatherV2]
    notes: >
      [MEDIUM] op-plugin: YAML:2664 / IndexSelectKernelNpuOpApi.cpp.
      aclnn: aclnnIndexSelect → GatherV3 (profiling verification: aclnnIndexSelect_GatherV3AiCore_GatherV3).
      The acl_op layer calls GatherV2, but the aclnn runtime actually dispatches to GatherV3.
      A GatherV3 entry exists in Qwen3 Profiling. Keep GatherV2 as an alternative for compatibility with older CANN versions.
      [Manual Review] A colleague confirmed that the actual kernel is GatherV3, which has been corrected.

  "aten.convolution.default":
    kernel_type: Conv2D
    notes: >
      [LOW] op-plugin: YAML:1709 / ConvolutionKernelNpuOpApi.cpp.
      aclnn: aclnnConvolution.
      LLM does not contain convolutional layers, and there is no such operator in profiling; it is only used for video/image models (DiT, etc.).
      [Manual Review] A colleague pointed out "Why is it 2D and not 3D/1D", Conv2D is the actual kernel type name of aclnn (Conv2D is used uniformly even when dealing with 1D/3D);
      It does not appear in profiling and cannot be verified. If it is extended to DiT, it needs to be confirmed again.

  "aten.cat.default":
    kernel_type: ConcatD
    notes: >
      [HIGH] op-plugin: YAML:1466 / CatKernelNpuOpApi.cpp.
      aclnn: aclnnCat.
      Profiling: DSV3 ConcatD(246x), Qwen3 ConcatD(3x).

  "tensor_cast.cat.default":
    kernel_type: ConcatD
    notes: >
      [HIGH] Same as aten.cat.default kernel; TC-specific cat op (retains dtype, only shape calculations).
      op-plugin: YAML:1466 / CatKernelNpuOpApi.cpp.
      aclnn: aclnnCat.

  "aten.add.Tensor":
    kernel_type: Add
    notes: >
      [HIGH] op-plugin: YAML:862 / AddKernelNpuOpApi.cpp.
      aclnn: aclnnAdd (tensor+tensor), aclnnAdds (tensor+scalar); all produce Type=Add.
      Profiling: DSV3 Decode Add(7545x, residual connection + bias addition).
      [Manual Review] A colleague marked N but did not give a reason; after checking AddKernelNpuOpApi.cpp, it was confirmed that aclnnAdd → Add, the mapping is correct.

  "aten.to.dtype":
    kernel_type: Cast
    alternate_kernel_types: [TensorMove]
    notes: >
      [HIGH] op-plugin: CastKernelNpuOpApi.cpp → aclnnCast (dtype conversion).
      _to_copy path: aclnnInplaceCopy (same dtype produces TensorMove instead of Cast).
      Profiling: DSV3 Decode Cast(2788x, dtype conversion).
      [Manual Review] A colleague pointed out that TensorMove/BroadcastTo may occur; after verification, BroadcastTo is a shape broadcast non-dtype conversion,
      TensorMove only appears when copying the same dtype, has been added as alternate.


  # ========== 2. Quantized Linear ==========
  # op-plugin unified entrance: npu_weight_quant_batchmatmul (YAML:6529)

  "tensor_cast.static_quant_linear.default":
    kernel_type: QuantBatchMatmulV3
    notes: >
      [HIGH] op-plugin: YAML:6529 / WeightQuantBatchMatmulV2KernelNpuOpApi.cpp.
      aclnn: aclnnWeightQuantBatchMatmulV2/V3; inner_precise=1 → V3 (vLLM default).
      W8A8; DSV3 Decode in INT8;INT8 ND;FRACTAL_NZ.
      Profiling: DSV3 Decode QuantBatchMatmulV3(15006x) — the highest frequency operator.

  "tensor_cast.static_quant_linear_int4.default":
    kernel_type: QuantBatchMatmulV3
    notes: >
      [MEDIUM] op-plugin: YAML:6529 (npu_weight_quant_batchmatmul) + YAML:6257 (npu_quant_matmul).
      aclnn: aclnnWeightQuantBatchMatmulV2/V3, aclnnQuantMatmulV5.
      W4A8; INT4 weights packed as INT32 (8 values/INT32).
      Two paths: npu_weight_quant_batchmatmul (antiquant_scale/offset) or npu_quant_matmul (A8W4 → aclnnQuantMatmulV5).
      There is no W4A8 profiling data verification, but the expected Type of both is QuantBatchMatmulV3.

  "tensor_cast.fp8_linear.default":
    kernel_type: QuantBatchMatmulV3
    notes: >
      [LOW] There is no FP8-specific matmul API in op-plugin.
      FP8 may pass npu_weight_quant_batchmatmul passed in FP8 dtype,
      Or rely on a newer version of CANN. Mapping to QuantBatchMatmulV3 is a design-time assumption, to be verified by FP8 profiling.

  "tensor_cast.mxfp4_linear.default":
    kernel_type: QuantBatchMatmulV3
    notes: >
      [LOW] There is no MXFP4 dedicated API in op-plugin. MXFP4 in TC only supports meta tensor.
      Mapping to QuantBatchMatmulV3 as placeholder, to be verified after hardware support.


  # ========== 3. GroupedMatmul (MoE) ==========
  # op-plugin unified entrance: npu_grouped_matmul (YAML:5954)
  # All quantization variants share the same API, distinguished by scale/offset/antiquant_* optional parameters

  "tensor_cast.grouped_matmul.default":
    kernel_type: GroupedMatmul
    notes: >
      [HIGH] op-plugin: YAML:5954 / GroupedMatmulKernelNpuOpApi.cpp.
      aclnn: aclnnGroupedMatmul/V4/V5/WeightNz; BF16 base, no scale/offset parameters.
      Profiling: DSV3 Decode GroupedMatmul(4756x).

  "tensor_cast.grouped_matmul_quant.default":
    kernel_type: GroupedMatmul
    notes: >
      [HIGH] op-plugin: YAML:5954 (scale + per_token_scale populated).
      aclnn: aclnnGroupedMatmulV4/V5/WeightNz.
      W8A8; scale/per_token_scale parameter filling.

  "tensor_cast.grouped_matmul_quant_int4.default":
    kernel_type: GroupedMatmul
    notes: >
      [HIGH] op-plugin: YAML:5954 (antiquant_scale/offset for INT4 dequant).
      aclnn: aclnnGroupedMatmulV4/V5/WeightNz.
      W4A8; INT4 weights packed as INT32, C++ handles n0 * INT4_NUMS_IN_INT32.

  "tensor_cast.grouped_matmul_fp8.default":
    kernel_type: GroupedMatmul
    notes: >
      [HIGH] op-plugin: YAML:5954 (scale + per_token_scale, no offset).
      aclnn: aclnnGroupedMatmulV4/V5/WeightNz.
      FP8; scale only (no offset), same API as base.

  "tensor_cast.grouped_matmul_mxfp4.default":
    kernel_type: GroupedMatmul
    notes: >
      [MEDIUM] op-plugin: YAML:5954.
      aclnn: aclnnGroupedMatmulV4/V5/WeightNz.
      MXFP4; Same signature as FP8, MXFP4 hardware support depends on CANN version.


  # ========== 4. GroupedMatmul+SwiGlu fusion ==========
  # op-plugin: npu_grouped_matmul_swiglu_quant (YAML:6136, V1 only in 7.2.0; V2 not available)
  # TC implementation: GroupedMatmulSwigluPass (compilation/freezing_passes/)

  "tensor_cast.grouped_matmul_swiglu.default":
    kernel_type: GroupedMatmul
    notes: >
      [MEDIUM] op-plugin: YAML:5954 (npu_grouped_matmul with act_type parameter).
      aclnn: aclnnGroupedMatmulV4/V5.
      BF16 GMM+SwiGlu; Activate SwiGlu fusion via the act_type parameter of npu_grouped_matmul.

  "tensor_cast.grouped_matmul_quant_swiglu.default":
    kernel_type: GroupedMatmulSwigluQuant
    notes: >
      [HIGH] op-plugin: YAML:6136 (V1 only) / GroupedMatmulSwigluQuantNpuOpapi.cpp.
      aclnn: aclnnGroupedMatmulSwigluQuantWeightNZ (V1 only; V2 not in op-plugin 7.2.0).
      W8A8 GMM+SwiGlu+Quant three-in-one fusion; output (INT8 output, scale, offset).
      Profiling: DSV3 Decode DequantSwigluQuant(4879x) corresponds to this fusion operator.

  "tensor_cast.grouped_matmul_quant_int4_swiglu.default":
    kernel_type: GroupedMatmulSwigluQuant
    notes: >
      [LOW] op-plugin: V2 API not available in op-plugin 7.2.0; only V1 at YAML:6136.
      aclnn: aclnnGroupedMatmulSwigluQuantWeightNZ (V1, W8A8 only).
      W4A8 GMM+SwiGlu+Quant: V2 API (dequant_mode/dequant_dtype for INT4) expected in future CANN.
      Currently unsupported in op-plugin 7.2.0; mapping to DequantSwigluQuant is a placeholder.

  "tensor_cast.grouped_matmul_fp8_swiglu.default":
    kernel_type: GroupedMatmulSwigluQuant
    notes: >
      [LOW] op-plugin: V2 API not available in op-plugin 7.2.0; only V1 at YAML:6136.
      aclnn: aclnnGroupedMatmulSwigluQuantWeightNZ (V1, W8A8 only).
      FP8 GMM+SwiGlu+Quant: V2 API expected in future CANN. Placeholder mapping.

  "tensor_cast.grouped_matmul_mxfp4_swiglu.default":
    kernel_type: GroupedMatmulSwigluQuant
    notes: >
      [LOW] op-plugin: V2 API not available in op-plugin 7.2.0; only V1 at YAML:6136.
      aclnn: aclnnGroupedMatmulSwigluQuantWeightNZ (V1, W8A8 only).
      MXFP4 GMM+SwiGlu+Quant: V2 API expected in future CANN. Placeholder mapping.


  # ========== 5. MoE Routing (Token Routing) ==========
  # EP path: npu_moe_distribute_dispatch_v2 / npu_moe_distribute_combine_v2
  # Non-EP path: npu_moe_init_routing_v2 / npu_moe_finalize_routing

  "tensor_cast.init_routing_v2.default":
    kernel_type: MoeTokenPermute
    tc_input_count: 2
    notes: >
      [MEDIUM] op-plugin: YAML:6146 (npu_moe_distribute_dispatch_v2) / MoeDistributeDispatchV2KernelOpApi.cpp.
      aclnn: aclnnMoeDistributeDispatchV2/V3 (no V4 in op-plugin 7.2.0).
      EP scenarios map to MoeDistributeDispatchV2; non-EP scenarios map to MoeInitRouting
      (npu_moe_init_routing_v2, YAML:6130, aclnn: aclnnMoeInitRoutingV2/V3).
      TC model permute + independent all_to_all, while NPU is fused into a single kernel.
      Profiling: DSV3 Decode MoeDistributeDispatchV2(2378x).

  "tensor_cast.unpermute_tokens.default":
    kernel_type: MoeTokenUnpermute
    tc_input_count: 1
    notes: >
      [MEDIUM] op-plugin: YAML:6152 (npu_moe_distribute_combine_v2) / MoeDistributeCombineKernelV2OpApi.cpp.
      aclnn: aclnnMoeDistributeCombineV2/V3 (no V4 in op-plugin 7.2.0).
      EP scenarios map to MoeDistributeCombineV2; non-EP scenarios map to MoeFinalizeRouting
      (npu_moe_finalize_routing, YAML:6115, aclnn: aclnnMoeFinalizeRouting/V2).
      Profiling: DSV3 Decode MoeDistributeCombineV2(2378x).

  "tensor_cast.moe_gating_top_k_softmax.default":
    kernel_type: MoeGatingTopK
    notes: >
      [HIGH] op-plugin: YAML:6123 (npu_moe_gating_top_k) / MoeGatingTopKKernelNpuOpApi.cpp.
      aclnn: aclnnMoeGatingTopK.
      vllm-ascend: vllm_ascend/ops/experts_selector.py → torch_npu.npu_moe_gating_top_k().
      TC currently uses aten.topk to implement routing, and NPU has a dedicated fusion kernel (the TC operator is to be added and has not been registered in develop).
      Profiling: DSV3 Decode MoeGatingTopK(2378x).


  # ========== 6. Attention ==========
  # op-plugin: npu_fused_infer_attention_score (YAML:5873) / _v2 (YAML:5886)

  "tensor_cast.attention.default":
    kernel_type: FusedInferAttentionScore
    query_mode: attention_special
    notes: >
      [HIGH] op-plugin: YAML:5873 / FusedInferAttentionScoreKernelNpuOpApi.cpp.
      aclnn: aclnnFusedInferAttentionScoreV2 (CANN <8.1.RC1), V3 (>=8.1.RC1).
      The two modes of PA/FA have the same Type.
      Profiling: DSV3 Decode(2501x), Qwen3 Prefill(67x).

  "tensor_cast.attention_quant.default":
    kernel_type: FusedInferAttentionScore
    query_mode: attention_special
    notes: >
      [HIGH] op-plugin: YAML:5873 (V1 with dequant/quant scales) + YAML:5886 (V2 with quant_mode).
      aclnn: aclnnFusedInferAttentionScoreV2/V3/V4; V2 API goes to V4 aclnn.
      Quantize attention; quant params are filled in but the underlying kernel Type remains unchanged.


  # ========== 7. MLA (Multihead Latent Attention) ==========
  # MLA uses different kernel combinations for composite op, decode/prefill (branched by decomposer)

  "tensor_cast.multihead_latent_attention.default":
    composite: true
    sub_kernels: [TransposeBatchMatMul, FusedInferAttentionScore, MatMulV2, RINGMLAPrefillBF16Kernel]
    notes: >
      [HIGH] MLA composite, decode/prefill using different kernel combinations (forked by decomposer).
      Decode: TransposeBMM(q@W_UK_T) + FIA(attention) + TransposeBMM(out@W_UV).
      op-plugin: YAML:6534 (npu_transpose_batchmatmul) + YAML:5873.
      aclnn: aclnnTransposeBatchMatMul + aclnnFusedInferAttentionScoreV2.
      Prefill: MatMulV2(kv_c@kv_b_proj) + RINGMLAPrefillBF16Kernel.
      Note: DSV3 prefill does not use FusedInferAttentionScore (v1.5 verification confirmation).

  "tensor_cast.multihead_latent_attention_quant.default":
    composite: true
    sub_kernels: [QuantBatchMatmulV3, FusedInferAttentionScore, MatMulV2, RINGMLAPrefillBF16Kernel]
    notes: >
      [HIGH] Quantized MLA, decode/prefill using different kernel combinations (branched by decomposer).
      Decode: QuantBatchMatmulV3(q@W_UK_T) + FIA + QuantBatchMatmulV3(out@W_UV).
      op-plugin: YAML:6534 + YAML:5873/5886.
      Prefill: MatMulV2(kv_c@kv_b_proj) + RINGMLAPrefillBF16Kernel.
      Additional AscendQuantV2/DynamicQuant kernel for intermediate quant/dequant steps.

  "tensor_cast.mlapo.default":
    composite: true
    sub_kernels: [MatMulV2, KvRmsNormRopeCache]
    notes: >
      [HIGH] MLAPO composite: TC fuses projection+norm+RoPE. Decomposer splits
      into 3x MatMulV2 (q_a, q_b, kv_a projections) + KvRmsNormRopeCache (post-projection
      norm+rope). Shapes derived from OpInvokeInfo.args projection weights.

  "tensor_cast.mlapo_quant.default":
    composite: true
