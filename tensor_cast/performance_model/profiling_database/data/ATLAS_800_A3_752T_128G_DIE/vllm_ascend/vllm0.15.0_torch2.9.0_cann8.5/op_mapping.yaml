# op_mapping.yaml — operator mapping table (CANN 8.5 + vLLM-ascend 0.15.0 + PyTorch 2.9.0)
# Path: tensor_cast/performance_model/perf_database/data/{device}/vllm_ascend/{version}/op_mapping.yaml
#
# Mapping methodology (follow tutorial/OP_PLUGIN_MAPPING_TUTORIAL.md):
# Each mapping follows a complete evidence chain, and the evidence is written into the notes field:
# Path A: TC op → torch_npu/aten API → op-plugin YAML → C++ impl → EXEC_NPU_CMD(aclnn*) → Profiling Type
# Path B: vLLM-ascend Python → torch_npu.npu_* → op-plugin → aclnn* → Profiling Type
# Path C: vLLM-ascend fusion pass → custom kernel → Profiling Type
#
# Data source:
# - TensorCast registration operator: register_tensor_cast_op (56 ops, tensor_cast/ops/*.py)
#   - pytorch-npu (op-plugin): /home/horacehxw/Projects/pytorch-npu/ (v7.3.0-pytorch2.9.0)
#   - vLLM-ascend: /home/horacehxw/Projects/vllm-ascend/ (v0.15.0rc1)
#   - CANN repos: ops-nn, ops-transformer, ops-math (v8.5.0)
# - Qwen3-32B PandD Profiling (CANN 8.5): 16 cards BF16 aclgraph, 28641 kernels, 37 unique Types
# - Qwen3-32B PandD Profiling v2 (CANN 8.5, stack): 16 cards BF16 aclgraph, 4046 kernels, 1P+2D, 37 unique Types
# - DeepSeek-V3 PandD Profiling (CANN 8.5): 32 cards W8A8 aclgraph, 36918 kernels, 41 unique Types
#
#CANN 8.5 vs 8.3 Key changes:
# - AddRmsNorm → AddRmsNormBias (vllm-ascend v0.15.0 custom op, csrc/add_rms_norm_bias/)
# - ApplyRotaryPosEmb → _triton_rope + split_qkv_rmsnorm_rope_kernel (Triton fusion)
# - ApplyTopKTopPWithSorted → ApplyTopKTopPCustom (vllm-ascend custom sampling op)
# - Added allgatherAicpuKernel (AICPU all-gather variant)
# - Added reduce_scatterAicpuKernel (AICPU reduce_scatter variant, symmetrical with allgatherAicpuKernel)
# - Added MatMulV3 (Big M Prefill GEMM, CANN 8.5 new kernel; Decode still uses MatMulV2)
# - Added LinearIndex (ScatterElementsV2 internal sub-kernel)
# - DispatchFFNCombine: vllm-ascend v0.15.0 super fusion MoE op (csrc/dispatch_ffn_combine/)
#
# DSv3 0319 New kernel (vs 0316):
# - Communication mode change: hcom_reduceScatter_ → hcom_allReduce_ (reduceScatter disappears in new data)
# - Added PadV3 / PadV3AiCore (decode padding, 35K+ calls)
# - Added MemSet (memory initialization, 35K+ times)
# - Added allreduceAicpuKernel (AICPU allReduce variant, 6.6K times)
# - Added BatchMatMulNd (BMM variant, 282 times)
# - A large number of AiCore acceleration variants: SliceAiCore, AddAiCore, AscendQuantV2Aicore, TransposeAiCore, etc.
# - TransData disappears
# Replacement MoeDistributeDispatchV2 + GroupedMatmul(×2) + SwiGlu + MoeDistributeCombineV2 + Unpermute
# In DSv3 profiling, routing expert FFN is all executed by DispatchFFNCombine, and GroupedMatmul no longer appears
#
# ============================================================================
#Field Reference (Field Reference)
# ============================================================================
#
# --- Top-level Fields ---
#
# version (string): vLLM-ascend version number, identifying the profiling data source.
# device (string): Hardware device model (such as ATLAS_800_A3_752T_128G_DIE).
# cann_version (string): CANN version number, affects kernel type and fusion behavior.
# pytorch_version (string): PyTorch version number.
# op_plugin_version (string): op-plugin version number.
# collection_date (string): profiling data collection date (YYYY-MM-DD).
# communication_data_ref (string): Relative path to communication CSV data.
# communication_fallback (string): Fallback strategy when communication query misses (analytic).
# --- Available fields for each mapping in operator_mappings ---
#
# kernel_type (string, required*):
# The value of the Type column in NPU Profiling kernel_details.csv is also the CSV file name.
# Constraint: Must exactly match the file name of {kernel_type}.csv in the data/ directory.
# Example: kernel_type: MatMulV2 → Query MatMulV2.csv
# * Can be omitted when zero_cost: true or composite: true.
#
# alternate_kernel_types (list[string], optional):
# List of alternative kernel types, sorted by priority. When the CSV query of kernel_type misses,
# Try the kernel types in the alternate list in sequence.
# Constraint: Each value must have a corresponding {name}.csv file.
# Example: alternate_kernel_types: [MatMulV3, MatMulCommon]
#
# category (string, optional):
# Operator category, drives query dispatch logic. Default is "compute".
# Optional values: compute | communication
# - compute: standard calculation operator, matches CSV by shape (default)
# - communication: communication operator, query hccl CSV by message_bytes + topology_tier
# Example: category: communication → Take the communication query path
#
# query_mode (string, optional):
# Special query mode, overriding the default shape matching logic.
# Optional values: attention_special | elementwise | moe_fused
# - attention_special: query by (batch, seq, heads, head_dim) quadruple
# - elementwise: match by output shape, scale using byte-ratio dtype
# - moe_fused: MoE fusion operator special query mode
# Example: query_mode: attention_special
#
# composite (bool, optional):
# true indicates 1:N composite mapping, and one op of TC corresponds to multiple kernels on the NPU.
# Need to be used with sub_kernels or decomposer.
# Constraint: kernel_type is not required when composite: true.
#
# sub_kernels (list[string], used when composite):
# List of sub-kernels for composite mapping. When querying, query the sub-kernels one by one and sum them up.
# Constraint: Each sub-kernel must have a corresponding CSV or be a known communication kernel.
# Example: sub_kernels: [MatMulV2, hcom_allReduce_]
#
#decomposer (bool, optional):
# true means use the Python decomposer function for decomposition (instead of the static sub_kernels list).
# decomposer dynamically generates sub-kernel queries based on OpInvokeInfo at runtime.
# Constraint: only for mappings with composite: true.
#
# tc_input_count (int, optional):
# The number of valid tensor inputs on the TC side, used to intercept the first N inputs during shape matching.
# Background: The input number/order of TC op and NPU kernel may be different (for example, NPU has additional axis parameters).
# Example: tc_input_count: 2 → only match the shape of the first 2 tensor inputs
#
# zero_cost (bool, optional):
# true means that the op has no actual kernel execution on the NPU (shape-only view, fusion absorption, etc.).
# The query returns 0 directly, without accessing CSV.
# Constraint: kernel_type is not required when zero_cost: true.
#
# accepted_miss (string, optional):
# Mark this op's CSV query as MISS as expected behavior (not an error), and explain why.
# Used when TC exists but the corresponding kernel does not exist in NPU profiling.
#
# notes (string, recommended):
# Evidence chain + supplementary explanation. Format: [Priority] Traceability path + profiling verification.
# Priority: [HIGH] high frequency/critical path, [MEDIUM] medium frequency, [LOW] low frequency/placeholder.
#
# ============================================================================
# Add new mapping example
# ============================================================================
#
# Example 1: Standard calculation operator (1:1 mapping)
#   "aten.mm.default":
# kernel_type: MatMulV2 # CSV file: MatMulV2.csv
# alternate_kernel_types: [MatMulV3] # Alternative: MatMulV3.csv
#     notes: "[HIGH] op-plugin: aclnnMm. Profiling: MatMulV2(275x)."
#
# Example 2: Communication operator
#   "tensor_cast.all_reduce.default":
#     kernel_type: hcom_allReduce_
# category: communication # Take the communication query path
#     notes: "[HIGH] HCCL direct."
#
# Example 3: Composite operators (static sub_kernels)
#   "tensor_cast.matmul_all_reduce.default":
# composite: true # 1:N mapping
# sub_kernels: [MatMulV2, hcom_allReduce_] # Query and sum one by one
#     notes: "[MEDIUM] MC2 fusion."
#
# Example 4: Composite operator (dynamic decomposer)
#   "tensor_cast.multihead_latent_attention.default":
#     composite: true
# decomposer: true # Dynamic decomposition at runtime
# notes: "[HIGH] MLA composite, decode/prefill using different kernel combinations."
#
# Example 5: Zero-cost op
#   "aten.view.default":
# zero_cost: true # Return 0 directly
#     notes: "Shape-only view, no kernel execution on NPU"
#
# Example 6: Special query mode
#   "tensor_cast.attention.default":
#     kernel_type: FusedInferAttentionScore
# query_mode: attention_special # Query by (batch,seq,heads,head_dim)
#     notes: "[HIGH] aclnnFusedInferAttentionScoreV2/V3."
#
# ============================================================================
# Frequently Asked Questions (FAQ)
# ============================================================================
#
# Q1: Where does the value of kernel_type come from?
# A1: Obtained from the Type column of kernel_details.csv of NPU profiling.
# After parsing using tools/perf_data_collection/parse_kernel_details.py,
# Each unique Type will generate a {Type}.csv file.
#
# Q2: What should I do if the input numbers of TC op and NPU kernel are different?
# A2: Use tc_input_count to specify the number of valid inputs on the TC side.
# For example, TC embedding has (weight, indices), NPU CSV has (weight, indices, axis),
# Set tc_input_count: 2 to only match the first 2.
#
# Q3: What should I do if one TC op corresponds to multiple NPU kernels?
# A3: Use composite: true + sub_kernels list, or decomposer: true.
# Use sub_kernels for static decomposition, and decomposer for dynamic decomposition (depending on runtime shape).
#
# Q4: How to deal with the kernel that appears in NPU profiling but has no corresponding op in TC?
# A4: Add the "profiling.{KernelType}" entry in the "Profiling-only Placeholder" area.
# These entries are used for CSV data integrity, TC will not actively query them.
#
# Q5: What should I do if the same aclnn API produces different kernel types in different CANN versions?
# A5: Use alternate_kernel_types to list all possible kernel types, sorted by priority.
# For example, CANN 8.5 uses AddRmsNormBias, CANN 8.3 uses AddRmsNorm:
#     kernel_type: AddRmsNormBias
#     alternate_kernel_types: [AddRmsNorm]
#

version: "0.15.0"
device: ATLAS_800_A3_752T_128G_DIE
cann_version: "8.5"
pytorch_version: "2.9.0"
op_plugin_version: "7.3.0"
collection_date: "2026-03-15"

communication_data_ref: "../../hccl/v8.5/"
communication_fallback: analytic

interpolation_policy:
  kernel_overrides:
    MatMulV2:
      max_interpolation_dim: 1
    MatMulV3:
      max_interpolation_dim: 1
    MatMulCommon:
      max_interpolation_dim: 1
    FusedInferAttentionScore:
      axis_transform: sqrt_seq
    SparseFlashAttention:
      # SFA is matched in compute mode on the q-shape (num_tokens, num_heads,
      # fia_head_dim); this shape carries no seq/topk dimension, so the transform
      # interpolates over num_tokens, not avg_seq_len. The single-q-shape key
      # cannot yet distinguish context/topk length — revisit whether to encode
      # avg_seq_len/topk in the key before importing real SFA profiling data
      # (see issue #213). linear = no sqrt transform (compute-mode default).
      axis_transform: linear
    GatherV2:
      generic_compute:
        axis: output_numel
    Index:
      generic_compute:
        axis: output_numel

# ============================================================================
# Calculate operator mapping (operator_mappings)
# ============================================================================

operator_mappings:

  # ========== 1. Standard aten operator ==========

  "aten.mm.default":
    kernel_type: MatMulV2
    alternate_kernel_types: [MatMulV3, MatMulCommon]
    notes: >
      [HIGH] op-plugin: MmKernelNpuOpApi.cpp → aclnnMm (ND) / aclnnMatmulWeightNz (NZ).
      CANN 8.5 kernel dispatch (automatic, CANN internal):
        - MatMulV2: small M (Decode, QKV/O projections)
        - MatMulV3: large M (Prefill FFN, M > ~256-512)
        - MatMulCommon: fallback for special shapes
      0313 profiling: MatMulV2(35444x), MatMulV3(640x, Prefill FFN), MatMulCommon(536x).
      alternate_kernel_types order: try V2 first (most common), then V3, then Common.

  "aten.addmm.default":
    kernel_type: MatMulV2
    notes: >
      [MEDIUM] op-plugin: AddmmKernelNpuOpApi.cpp.
      aclnn: aclnnAddmm (ND), aclnnAddmmWeightNz (NZ); The underlying kernel Type is still MatMulV2.
      In vLLM inference, nn.Linear usually takes mm (no bias), and addmm rarely appears.

  "aten.bmm.default":
    kernel_type: BatchMatMulV2
    alternate_kernel_types: [TransposeBatchMatMul, BatchMatMulNd]
    notes: >
      [HIGH] op-plugin: BmmKernelNpuOpApi.cpp → aclnnBatchMatMul → BatchMatMulV2.
      Dispatch: transpose_b parameter → TransposeBatchMatMul (MLA attn_output @ W_UV).
      Standard BMM → BatchMatMulV2. 0313 profiling: BatchMatMulV2(305x), TransposeBatchMatMul(305x).

  "aten.embedding.default":
    kernel_type: GatherV2
    alternate_kernel_types: [GatherV3]
    tc_input_count: 2
    notes: >
      [HIGH] op-plugin: EmbeddingKernelNpuOpApi.cpp.
      aclnn: aclnnEmbedding → GatherV2. Qwen3 GatherV3 also appears in CANN 8.5, alternate has been added.
      TC has (weight, indices, ...); NPU CSV has (weight, indices, axis) — tc_input_count=2.
      Dispatch: aten.embedding → GatherV2; aten.index_select → GatherV3 (different API path).

  "aten.index_select.default":
    kernel_type: GatherV3
    alternate_kernel_types: [GatherV2]
    notes: >
      [MEDIUM] op-plugin: IndexSelectKernelNpuOpApi.cpp.
      aclnn: aclnnIndexSelect → GatherV3.

  "aten.convolution.default":
    kernel_type: Conv2D
    notes: >
      [LOW] op-plugin: ConvolutionKernelNpuOpApi.cpp.
      aclnn: aclnnConvolution. LLM does not contain convolutional layers; only used for video/image models.

  "aten.cat.default":
    zero_cost: true
    notes: >
      [HIGH] ConcatD never appears in CANN 8.5 vLLM profiling.
      NPU concat is typically zero-copy view when tensors are contiguous.
      MoE shared expert path concat is negligible.

  "tensor_cast.cat.default":
    zero_cost: true
    notes: >
      [HIGH] Same as aten.cat.default; NPU concat is zero-copy view.

  "aten.add.Tensor":
    kernel_type: Add
    alternate_kernel_types: [AddAiCore]
    query_mode: elementwise
    notes: >
      [HIGH] op-plugin: AddKernelNpuOpApi.cpp.
      aclnn: aclnnAdd. Profiling: Qwen3 CANN 8.5 Add(30x).
      query_mode=elementwise: output-shape matching with byte-ratio dtype scaling.
      Solves FP32 vs BF16 dtype gap and broadcast pattern ambiguity.

  "aten.to.dtype":
    kernel_type: Cast
    alternate_kernel_types: [TensorMove, CastAiCore]
    notes: >
      [HIGH] op-plugin: CastKernelNpuOpApi.cpp → aclnnCast.
      Dispatch (CANN internal): src_dtype != dst_dtype → Cast; src_dtype == dst_dtype → TensorMove.
      CastAiCore: AiCore-accelerated Cast variant (CANN 8.5+). 0313 profiling: Cast(1613x), CastAiCore(670x).


  # ========== 2. Quantized Linear ==========

  "tensor_cast.static_quant_linear.default":
    kernel_type: QuantBatchMatmulV3
    tc_input_count: 2
    notes: >
      [HIGH] op-plugin: WeightQuantBatchMatmulV2KernelNpuOpApi.cpp.
      aclnn: aclnnWeightQuantBatchMatmulV2/V3. W8A8 path.
      TC has (x, weight, scale, ...); NPU CSV has (x, weight_NZ, scale, scale) — tc_input_count=2 for (x, weight).

  "tensor_cast.static_quant_linear_int4.default":
    kernel_type: QuantBatchMatmulV3
    notes: >
      [MEDIUM] op-plugin: npu_weight_quant_batchmatmul / npu_quant_matmul.
      W4A8; INT4 weights packed as INT32.

  "tensor_cast.fp8_linear.default":
    kernel_type: QuantBatchMatmulV3
    notes: >
      [LOW] FP8 matmul; mapping to QuantBatchMatmulV3 is a design assumption, to be verified by FP8 profiling.

  "tensor_cast.mxfp4_linear.default":
    kernel_type: QuantBatchMatmulV3
    notes: >
      [LOW] MXFP4 matmul; placeholder, to be verified after hardware support.


  # ========== 3. GroupedMatmul (MoE) ==========

  "tensor_cast.grouped_matmul.default":
    kernel_type: GroupedMatmul
    notes: >
      [HIGH] op-plugin: GroupedMatmulKernelNpuOpApi.cpp.
      aclnn: aclnnGroupedMatmul/V4/V5/WeightNz. BF16 base.

  "tensor_cast.grouped_matmul_quant.default":
    kernel_type: GroupedMatmul
    notes: >
      [HIGH] op-plugin: npu_grouped_matmul with scale/per_token_scale. W8A8.
      CANN 8.5 aclgraph: Routing expert down proj absorbed by DispatchFFNCombine super fusion.
      In --compile mode, grouped_matmul_quant is replaced by DispatchFFNCombine fusion pass.

  "tensor_cast.grouped_matmul_quant_int4.default":
    kernel_type: GroupedMatmul
    notes: >
      [HIGH] op-plugin: npu_grouped_matmul with antiquant_scale/offset. W4A8.

  "tensor_cast.grouped_matmul_fp8.default":
    kernel_type: GroupedMatmul
    notes: >
      [HIGH] op-plugin: npu_grouped_matmul with scale, no offset. FP8.

  "tensor_cast.grouped_matmul_mxfp4.default":
    kernel_type: GroupedMatmul
    notes: >
      [MEDIUM] op-plugin: npu_grouped_matmul. MXFP4.


  # ========== 4. GroupedMatmul+SwiGlu fusion ==========

  "tensor_cast.grouped_matmul_swiglu.default":
    kernel_type: GroupedMatmul
    notes: >
      [MEDIUM] op-plugin: npu_grouped_matmul with act_type parameter. BF16 GMM+SwiGlu.

  "tensor_cast.grouped_matmul_quant_swiglu.default":
    kernel_type: GroupedMatmulSwigluQuant
    notes: >
      [HIGH] op-plugin: GroupedMatmulSwigluQuantNpuOpapi.cpp.
      aclnn: aclnnGroupedMatmulSwigluQuantWeightNZ. W8A8 GMM+SwiGlu+Quant.
      CANN 8.5 aclgraph: Routing specialist FFN absorbed by DispatchFFNCombine super fusion.
      In --compile mode, grouped_matmul_quant_swiglu is replaced by DispatchFFNCombine fusion pass.

  "tensor_cast.grouped_matmul_quant_int4_swiglu.default":
    kernel_type: GroupedMatmulSwigluQuant
    notes: >
      [LOW] W4A8 GMM+SwiGlu+Quant; V2 API may be available in op-plugin 7.3.0.

  "tensor_cast.grouped_matmul_fp8_swiglu.default":
    kernel_type: GroupedMatmulSwigluQuant
    notes: >
      [LOW] FP8 GMM+SwiGlu+Quant; placeholder.

  "tensor_cast.grouped_matmul_mxfp4_swiglu.default":
    kernel_type: GroupedMatmulSwigluQuant
    notes: >
      [LOW] MXFP4 GMM+SwiGlu+Quant; placeholder.


  # ========== 5. MoE Routing (Token Routing) ==========

  "tensor_cast.dispatch_ffn_combine.default":
    kernel_type: DispatchFFNCombine
    tc_input_count: 1
    notes: >
      [HIGH] path: C. vllm-ascend v0.15.0 Super Fusion MoE op (csrc/dispatch_ffn_combine/).
      torch binding: torch.ops._C_ascend.dispatch_ffn_combine.
      aclnn: aclnnDispatchFFNCombine (INT8/W8A8) / aclnnDispatchFFNCombineBF16 (BF16).
      CANN: OP_ADD(DispatchFFNCombine) in dispatch_ffn_combine_def.cpp. Profiling: DispatchFFNCombine(928x, 35.3%).
      TC fusion pass (DispatchFFNCombinePass): replaces init_routing_v2 + grouped_matmul(×N) + unpermute_tokens
      into single fused op with args (x, expert_indices).
      TC has 2 tensor args (x, expert_indices); NPU has 7 (x, w1, w2, expert_idx, scale1, scale2, probs).
      tc_input_count=1: match on x shape (batch, hidden_size) only — weights are model-fixed.
      shape_flags: [flatten_batch — TC x is 3D (bs, seq, hidden), NPU CSV is 2D (batch, hidden)].

  "tensor_cast.dispatch_ffn_combine_quant.default":
    kernel_type: DispatchFFNCombine
    query_mode: moe_fused
    tc_input_count: 1
    notes: "W8A8 DFC variant. Same NPU kernel as dispatch_ffn_combine."

  "tensor_cast.dispatch_ffn_combine_quant_int4.default":
    kernel_type: DispatchFFNCombine
    query_mode: moe_fused
    tc_input_count: 1
    notes: "W4A8 DFC variant."

  "tensor_cast.dispatch_ffn_combine_fp8.default":
    kernel_type: DispatchFFNCombine
    query_mode: moe_fused
    tc_input_count: 1
    notes: "FP8 DFC variant."

  "tensor_cast.dispatch_ffn_combine_mxfp4.default":
    kernel_type: DispatchFFNCombine
    query_mode: moe_fused
    tc_input_count: 1
    notes: "MXFP4 DFC variant."

  "tensor_cast.init_routing_v2.default":
    kernel_type: MoeTokenPermute
    tc_input_count: 2
    notes: >
      [MEDIUM] op-plugin: MoeDistributeDispatchV2KernelOpApi.cpp.
      aclnn: aclnnMoeDistributeDispatchV2/V3/V4. EP path.
      CANN 8.5 aclgraph: Absorbed by DispatchFFNCombine Super Fusion.
      kernel_type follows CSV filename convention (MoeTokenPermute from kernel_details Type column).
      In v0.15.0+ --compile mode, init_routing_v2 is replaced by DispatchFFNCombine fusion pass.

  "tensor_cast.unpermute_tokens.default":
    kernel_type: MoeTokenUnpermute
    tc_input_count: 1
    notes: >
      [MEDIUM] op-plugin: MoeDistributeCombineKernelV2OpApi.cpp.
      aclnn: aclnnMoeDistributeCombineV2/V3/V4. EP path.
      CANN 8.5 aclgraph: Absorbed by DispatchFFNCombine Super Fusion.
      kernel_type follows CSV filename convention (MoeTokenUnpermute from kernel_details Type column).
      In v0.15.0+ --compile mode, unpermute_tokens is replaced by DispatchFFNCombine fusion pass.

  "tensor_cast.moe_gating_top_k_softmax.default":
    kernel_type: MoeGatingTopK
    notes: >
      [HIGH] op-plugin: MoeGatingTopKKernelNpuOpApi.cpp.
      aclnn: aclnnMoeGatingTopK.


  # ========== 6. Attention ==========

  "tensor_cast.attention.default":
    kernel_type: FusedInferAttentionScore
    query_mode: attention_special
    notes: >
      [HIGH] op-plugin: FusedInferAttentionScoreKernelNpuOpApi.cpp.
      aclnn: aclnnFusedInferAttentionScoreV2/V3.
      Profiling: Qwen3 CANN 8.5 FusedInferAttentionScore(1920x).

  "tensor_cast.attention_quant.default":
    kernel_type: FusedInferAttentionScore
    query_mode: attention_special
    notes: >
      [HIGH] op-plugin: V1 with dequant/quant scales + V2 with quant_mode.
      aclnn: aclnnFusedInferAttentionScoreV2/V3/V4.


  # ========== 7. MLA (Multihead Latent Attention) ==========

  "tensor_cast.multihead_latent_attention.default":
    composite: true
    sub_kernels: [TransposeBatchMatMul, FusedInferAttentionScore, MatMulV2, RINGMLAPrefillBF16Kernel]
    notes: >
      [HIGH] MLA composite, decode/prefill using different kernel combinations (forked by decomposer).
      Decode: TransposeBMM(q@W_UK_T) + FIA(attention) + TransposeBMM(out@W_UV).
      Prefill: MatMulV2(kv_c@kv_b_proj) + RINGMLAPrefillBF16Kernel.
      Note: DSV3 prefill does not use FusedInferAttentionScore (v1.5 verification confirmation).

  "tensor_cast.multihead_latent_attention_quant.default":
    composite: true
    sub_kernels: [QuantBatchMatmulV3, FusedInferAttentionScore, MatMulV2, RINGMLAPrefillBF16Kernel]
    notes: >
      [HIGH] Quantized MLA, decode/prefill using different kernel combinations (branched by decomposer).
      Decode: QuantBatchMatmulV3(q@W_UK_T) + FIA + QuantBatchMatmulV3(out@W_UV).
      Prefill: MatMulV2(kv_c@kv_b_proj) + RINGMLAPrefillBF16Kernel.
      Note: Prefill path is the same as the non-quantized version (RINGMLAPrefillBF16Kernel).

  "tensor_cast.mlapo.default":
    composite: true
    sub_kernels: [MatMulV2, KvRmsNormRopeCache]
    notes: >
      [HIGH] MLAPO composite: TC fuses projection+norm+RoPE. Decomposer splits
      into 3x MatMulV2 (q_a, q_b, kv_a projections) + KvRmsNormRopeCache (post-projection
      norm+rope). Shapes derived from OpInvokeInfo.args projection weights.

  "tensor_cast.mlapo_quant.default":
    composite: true
    sub_kernels: [QuantBatchMatmulV3, KvRmsNormRopeCache]
    notes: >
      [HIGH] Quantized MLAPO composite: same decomposition, QuantBatchMatmulV3
      for projections instead of MatMulV2.


  "tensor_cast.mla_sparse_attention.default":
    composite: true
    decomposer: true
    notes: >
