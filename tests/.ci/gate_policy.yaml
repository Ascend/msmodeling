roots:
  - cli/
  - optix/
  - serving_cast/
  - tensor_cast/
  - web_ui/
  - scripts/
  - tools/

tests:
  include:
    - "tests/**/test_*.py"
    - "tests/**/*_test.py"
  exclude:
    - "tests/helpers/**"
    - "tests/assets/**"

configs:
  include:
    - "pyproject.toml"
    - "requirements.txt"
    - "uv.lock"
    - "tests/**/conftest.py"
  exclude: []

exemptions:
  sources:
    - symbols:
        - cli/inference/throughput_optimizer.py::%
        - serving_cast/parallel_runner.py::%
      reason: "Import-scope changes are covered through function-level throughput optimizer tests; coverage.py does not reliably attribute multiline import continuation lines."
      applicant: stormchasingg
      approver: liujiawang
      deadline: 2026-12-31
      ticket: "PR-438"

    - symbols:
        - tools/perf_data_collection/grid_generator/model_configs.py::_fetch_from_huggingface
      reason: "External HuggingFace config loading is covered by static fallback tests; no network dependency in PR UT."
      applicant: Secluded_Ocean
      approver: hexiaowu
      deadline: 2026-06-30
      ticket: "PR-252"

    - symbols:
        - tools/perf_data_collection/op_replay/DispatchFFNCombine_run.py::build_row_case
        - tools/perf_data_collection/op_replay/DispatchFFNCombine_run.py::main
        - tools/perf_data_collection/op_replay/DispatchFFNCombine_run.py::debug_dfc_tensor_devices
        - tools/perf_data_collection/op_replay/DispatchFFNCombine_run.py::run_row
        - tools/perf_data_collection/op_replay/DispatchFFNCombine_run.py::execute_dfc_op
      reason: "DispatchFFNCombine replay execution requires Ascend NPU/runtime; PR UT covers non-NPU argument, validation, and launch safety paths."
      applicant: Secluded_Ocean
      approver: hexiaowu
      deadline: 2026-06-30
      ticket: "PR-252"

    - symbols:
        - tools/perf_data_collection/op_replay/run_all_op.py::run_script_inprocess
        - tools/perf_data_collection/op_replay/run_all_op.py::run_script
        - tools/perf_data_collection/op_replay/run_all_op.py::main
      reason: "Replay orchestration entry points run operator scripts and require runtime-specific integration; PR UT covers CLI argument propagation and subprocess command construction."
      applicant: Secluded_Ocean
      approver: hexiaowu
      deadline: 2026-06-30
      ticket: "PR-252"

    - symbols:
        - tools/perf_data_collection/start_microbench.py::run_msprof_per_op_fallback
      reason: "Per-operator msprof fallback depends on Ascend profiler outputs; PR UT covers command construction and mocked msprof execution."
      applicant: Secluded_Ocean
      approver: hexiaowu
      deadline: 2026-06-30
      ticket: "PR-252"

    - symbols:
        - tensor_cast/core/input_generator.py::_resolve_decoder_attention_layer
        - tensor_cast/core/input_generator.py::get_sparse_attention_indexer_cache_info
        - tensor_cast/layers/deepseek_v4.py::DeepseekV4SparseAttention::build_tp_plan_extras@classmethod
        - tensor_cast/layers/deepseek_v4.py::DeepseekV4SparseAttention::build_o_proj_tp_plan_extras@classmethod
        - tensor_cast/layers/mla.py::tp_plan_module_path
        - tensor_cast/layers/mla.py::tp_plan_nested_module_path
      reason: "DeepSeek V4 sparse-attention helpers are covered by integration paths; dedicated unit tests pending."
      applicant: deepseek_v4_adaptation
      approver: liujiawang
      deadline: 2026-12-31
      ticket: deepseek-v4-ci-gate

    - symbols:
        - tensor_cast/performance_model/profiling_database/profiling_data_source.py::ProfilingDataSource::_lookup_composite_decomposed
        - tensor_cast/ops/mla.py::_@register_tensor_cast_op("mla_sparse_attention_quant")
      reason: "Methods are exercised by test_mla_decode_fia_miss_returns_none, TestMlaSparseProfilingFallback and test_mla_sparse_attention_quant_output_dtype_fallback but the static test_map cannot attribute coverage to these modified symbols."
      applicant: Hudingyi
      approver: liujiawang
      deadline: 2026-09-30
      ticket: "PR-363"

    - symbols:
        - tensor_cast/pipeline_parallel.py::PPMissingLayer::%
        - tensor_cast/pipeline_parallel.py::PipelineStageModel::%
        - tensor_cast/pipeline_parallel.py::PipelineModel::%
        - tensor_cast/pipeline_parallel.py::StageRunner::%
        - tensor_cast/pipeline_parallel.py::PipelineCommunicator::%
        - tensor_cast/pipeline_parallel.py::PipelineRunner::%
        - tensor_cast/pipeline_parallel.py::PipelineStageSpec::%
        - tensor_cast/pipeline_parallel.py::PipelinePlan::%
        - tensor_cast/pipeline_parallel.py::PipelineStageCacheStats::%
        - tensor_cast/pipeline_parallel.py::PipelineTransferStats::%
        - tensor_cast/pipeline_parallel.py::PipelineRunResult::%
        - tensor_cast/pipeline_parallel.py::_PipelineStageRunResult::%
        - tensor_cast/pipeline_parallel.py::_PipelineTransferRunResult::%
      reason: "PP class and result-container symbols are covered by dedicated pipeline-parallel regression tests; test_map does not reliably map class definitions."
      applicant: pp_real_split
      approver: hexiaowu
      deadline: 2026-12-31
      ticket: pp-real-split-ci-gate

  tests:
    - symbols:
        - tests/regression/cli/test_generate_comm_microbench.py::test_run_bench_kernel_no_sync_returns_positive_duration
        - tests/regression/cli/test_generate_comm_microbench.py::test_run_bench_kernel_leader_returns_positive_duration
        - tests/regression/cli/test_generate_comm_microbench.py::test_run_bench_event_returns_positive_duration
        - tests/regression/cli/test_generate_comm_microbench.py::test_run_bench_profiler_batch_large_msg
        - tests/regression/cli/test_generate_comm_microbench.py::test_run_bench_profiler_batch_small_msg
        - tests/regression/cli/test_generate_comm_microbench.py::test_run_benchmark_kernel_mode_writes_csv
      reason: "The CI environment does not support the execution of torch_npu test cases"
      applicant: zhenghaojie
      approver: liujiawang
      deadline: 2026-12-31
      ticket: "PR-412"
